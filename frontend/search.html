<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>ToxiView Search</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Search Papers</h1>

  <input id="q" placeholder="Enter keyword...">
  <button id="go">Search</button>

  <div id="results"></div>

  <script src="api.js"></script>
  <script>
    document.getElementById("go").onclick = async () => {
      const q = document.getElementById("q").value;
      const res = await apiSearch(q);

      const container = document.getElementById("results");
      container.innerHTML = "";

      res.papers.forEach(p => {
        const div = document.createElement("div");
        div.className = "paper";

        div.innerHTML = `
          <h3>${p.title}</h3>
          <p><strong>${p.journal}</strong> — ${p.year}</p>
          <p>${(p.abstract || "").slice(0, 200)}...</p>
          <a href="paper.html?pmid=${p.pmid}">Open Full Paper</a>
          <hr>
        `;

        container.appendChild(div);
      });
    };
  </script>
</body>
</html>
